name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          echo "name=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"
          echo "code=$(grep '^APP_VERSION_CODE=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches app version
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.app_version.outputs.name }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match APP_VERSION_NAME=${{ steps.app_version.outputs.name }}"
            exit 1
          fi

      - name: Decode signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          else
            echo "No signing keystore configured. Release APK will be built without signing."
          fi

      - name: Build APKs
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nezha-monitor-android-v${{ steps.app_version.outputs.name }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Prepare release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## Nezha Monitor Android

          Version: \`${{ steps.app_version.outputs.name }}\`
          Version Code: \`${{ steps.app_version.outputs.code }}\`
          Tag: \`${{ github.ref_name }}\`

          ### Assets

          - \`app-release.apk\`: release build artifact
          - \`app-debug.apk\`: debug build artifact

          ### Notes

          - If Android signing secrets are configured, the release APK will be signed.
          - If signing secrets are not configured, the release APK may be unsigned.
          - This release was generated automatically by GitHub Actions.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Nezha Monitor Android ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
